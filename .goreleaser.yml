version: 2

before:
  hooks:
    - go mod tidy

builds:
  - id: mindcli
    main: ./cmd/mindcli
    binary: mindcli
    env:
      - CGO_ENABLED=1
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: default
    format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: jankowtf
    name: mindcli

brews:
  - repository:
      owner: jankowtf
      name: homebrew-tap
    directory: Formula
    homepage: https://github.com/jankowtf/mindcli
    description: Fast, private TUI for personal knowledge management with AI-powered search
    license: MIT
    install: |
      bin.install "mindcli"
    test: |
      system "#{bin}/mindcli", "version"
